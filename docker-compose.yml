version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - pdf_storage:/app/storage/pdfs
      - upload_storage:/app/uploads
      - model_cache:/root/.cache
      - ./data:/app/data:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file: .env
    volumes:
      - pdf_storage:/app/storage/pdfs
      - upload_storage:/app/uploads
      - model_cache:/root/.cache
      - ./data:/app/data:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=1

  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    ports:
      - "7860:7860"
    env_file: .env
    depends_on:
      - api
    command: python src/ui/chatbot_ui.py

volumes:
  mysql_data:
  qdrant_data:
  pdf_storage:
  upload_storage:
  model_cache:
